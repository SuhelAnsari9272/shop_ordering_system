name: Keep Backend Warm

on:
  schedule:
    # Every 10 minutes, only during shop hours (2:30 AM – 5:30 PM UTC = 8 AM – 11 PM IST)
    - cron: '*/10 2-17 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf https://shop-ordering-system.onrender.com/ || echo "Ping failed, service may be waking up"